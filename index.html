<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <script defer src="js/app.js"></script>
</head>
<body>

  <!-- Top bar -->
  <header class="topbar" role="banner">
    <span class="topbar-title">Life Dashboard</span>
    <button id="theme-toggle" class="theme-toggle-btn"
            aria-label="Switch to light mode" title="Toggle theme">
      <span class="theme-icon">🌙</span>
    </button>
  </header>

  <main class="dashboard" role="main">

    <!-- Greeting Widget — full-width banner row -->
    <section id="greeting-widget" class="widget widget--greeting"
             aria-label="Greeting and time">

      <div class="greeting-left">
        <div class="greeting-name-row">
          <p class="greeting-text" aria-live="polite"></p>
          <button id="greeting-edit-btn" class="greeting-edit-btn"
                  aria-label="Edit your name" title="Set your name">✏️</button>
        </div>
        <div id="greeting-name-form" class="greeting-name-form" hidden>
          <label for="greeting-name-input" class="sr-only">Your name</label>
          <input type="text" id="greeting-name-input" class="greeting-name-input"
                 placeholder="Enter your name…" autocomplete="off" maxlength="40">
          <button id="greeting-name-save"
                  class="greeting-name-btn greeting-name-save">Save</button>
          <button id="greeting-name-cancel"
                  class="greeting-name-btn greeting-name-cancel">Cancel</button>
        </div>
      </div>

      <div class="greeting-right">
        <p class="greeting-time" aria-live="polite" aria-atomic="true"></p>
        <p class="greeting-date"></p>
      </div>

    </section>

    <!-- Focus Timer Widget -->
    <section id="timer-widget" class="widget widget--timer"
             aria-label="Focus timer">

      <div class="timer-header">
        <h2 class="widget-title">Focus Timer</h2>
        <button id="timer-settings-btn" class="timer-settings-btn"
                aria-label="Timer settings" aria-expanded="false"
                title="Configure durations">⚙</button>
      </div>

      <!-- Settings Panel (hidden by default) -->
      <div id="timer-settings-panel" class="timer-settings-panel" hidden>
        <div class="settings-fields-row">
          <div class="settings-field">
            <label for="settings-focus">Focus (min)</label>
            <input type="number" id="settings-focus" class="settings-input"
                   min="1" max="180" step="1">
            <span class="settings-error" id="settings-focus-error"
                  aria-live="polite"></span>
          </div>
          <div class="settings-field">
            <label for="settings-short">Short Break</label>
            <input type="number" id="settings-short" class="settings-input"
                   min="1" max="180" step="1">
            <span class="settings-error" id="settings-short-error"
                  aria-live="polite"></span>
          </div>
          <div class="settings-field">
            <label for="settings-long">Long Break</label>
            <input type="number" id="settings-long" class="settings-input"
                   min="1" max="180" step="1">
            <span class="settings-error" id="settings-long-error"
                  aria-live="polite"></span>
          </div>
        </div>
        <div class="settings-actions">
          <button id="settings-save-btn" class="timer-btn">Save</button>
          <button id="settings-cancel-btn" class="task-btn">Cancel</button>
        </div>
      </div>

      <div id="timer-display" class="timer-display"
           role="timer" aria-live="off" aria-label="Time remaining">25:00</div>
      <div class="timer-controls">
        <button id="timer-start" class="timer-btn">Start</button>
        <button id="timer-stop"  class="timer-btn" disabled>Stop</button>
        <button id="timer-reset" class="timer-btn">Reset</button>
      </div>

    </section>

    <!-- Task Manager Widget -->
    <section id="tasks-widget" class="widget widget--tasks"
             aria-label="To-do list">
      <h2 class="widget-title">To-Do</h2>
      <div class="task-add-row">
        <label for="task-input" class="sr-only">New task description</label>
        <input type="text" id="task-input" class="task-input"
               placeholder="Add a task…" autocomplete="off">
        <button id="task-add-btn" class="task-add-btn">Add</button>
      </div>
      <ul id="task-list" class="task-list" aria-label="Task list"></ul>
    </section>

    <!-- Quick Links Widget -->
    <section id="links-widget" class="widget widget--links"
             aria-label="Quick links">
      <h2 class="widget-title">Quick Links</h2>
      <div id="links-list" class="links-list"></div>
      <div class="link-add-form">
        <label for="link-label-input" class="sr-only">Link label</label>
        <input type="text" id="link-label-input" class="link-input"
               placeholder="Label" autocomplete="off">
        <label for="link-url-input" class="sr-only">Link URL</label>
        <input type="url"  id="link-url-input" class="link-input"
               placeholder="https://…" autocomplete="off">
        <button id="link-add-btn" class="link-add-btn">Add</button>
      </div>
    </section>

  </main>
</body>
</html>
